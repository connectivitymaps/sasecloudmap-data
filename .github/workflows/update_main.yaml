---
name: update main data

on:
  workflow_dispatch:

jobs:
  discover-providers:
    runs-on: ubuntu-24.04
    outputs:
      providers: ${{ steps.find-providers.outputs.providers }}
    steps:
      - uses: actions/checkout@v6
      - name: Find provider scripts
        id: find-providers
        run: |
          python -m provider_data.utils.provider_discovery --github-output "$GITHUB_OUTPUT"

  update-providers:
    needs: discover-providers
    runs-on: ubuntu-24.04
    concurrency:
      group: "shared-proxy-endpoint"
    strategy:
      max-parallel: 1
      matrix:
        provider: ${{ fromJson(needs.discover-providers.outputs.providers) }}
      fail-fast: false

    name: "Update ${{ matrix.provider.provider_name }}"

    steps:
      - uses: actions/checkout@v6

      - name: "prep env"
        env:
          DOTENV: ${{ secrets.DOTENV }}
        run: |
          echo -n $DOTENV | base64 -d > .env

      - name: "Install uv"
        uses: astral-sh/setup-uv@v8.0.0

      - name: "Install the project"
        run: uv sync --all-extras --dev

      - name: "Authorize runner IP for shared proxy endpoint"
        run: |
          uv run python -m provider_data.utils.update_proxy_endpoint --propagation-seconds 15

      - name: "Export HTTPS proxy environment"
        shell: bash
        run: |
          set -a
          source .env
          set +a
          echo "HTTPS_PROXY=https://${PROXY_ENDPOINT}:443" >> "$GITHUB_ENV"

      - name: "Update ${{ matrix.provider.provider_name }}"
        run: |
          uv run provider_data/${{ matrix.provider.script }}.py --prod

  generate-sitemap:
    needs: update-providers
    runs-on: ubuntu-24.04
    if: always()

    steps:
      - uses: actions/checkout@v6

      - name: "prep env"
        env:
          DOTENV: ${{ secrets.DOTENV }}
        run: |
          echo -n $DOTENV | base64 -d > .env

      - name: "Install uv"
        uses: astral-sh/setup-uv@v8.0.0

      - name: "Install the project"
        run: uv sync --all-extras --dev

      - name: "Generate sitemap"
        run: |
          uv run provider_data/utils/generate_sitemap.py --prod

  notify-on-failure:
    needs: [discover-providers, update-providers, generate-sitemap]
    runs-on: ubuntu-24.04
    if: >-
      always() && (
        needs.discover-providers.result == 'failure' ||
        needs.update-providers.result == 'failure' ||
        needs.generate-sitemap.result == 'failure'
      )

    steps:
      - name: "Notify in Chat on Failure"
        env:
          WEBHOOK_URL: ${{ secrets.G_WEBHOOK }}
        run: |
          curl -s -H "content-type: application/json" \
            -d '{
              "text": "🚨 Provider Data Update Failed!\n\n
              Workflow: ${{ github.workflow }}\n
              Repository: ${{ github.repository }}\n
              Branch: ${{ github.ref_name }}\n
              Commit: ${{ github.sha }}\n
              Triggered by: ${{ github.actor }}\n\n
              View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' \
            "${WEBHOOK_URL}" >/dev/null
