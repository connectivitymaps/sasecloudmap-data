---
name: update dev data (unified)

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 1'

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      providers: ${{ steps.discover.outputs.providers }}

    steps:
      - uses: actions/checkout@v6

      - name: "Discover providers"
        id: discover
        run: |
          python -m provider_data.utils.provider_discovery --github-output "$GITHUB_OUTPUT"

      - name: "prep env"
        env:
          DOTENV: ${{ secrets.DOTENV }}
        run: |
          echo -n $DOTENV | base64 -d > .env

      - name: "Install uv"
        uses: astral-sh/setup-uv@v8.0.0

      - name: "Install the project"
        run: uv sync --all-extras --dev

      - name: "Run test suite"
        run: |
          uv run pytest tests/ -q

  update-providers:
    needs: prepare
    runs-on: ubuntu-24.04
    concurrency:
      group: "shared-proxy-endpoint"
    strategy:
      max-parallel: 1
      matrix:
        provider: ${{ fromJson(needs.prepare.outputs.providers) }}
      fail-fast: false

    name: "Update ${{ matrix.provider.provider_name }}"

    steps:
      - uses: actions/checkout@v6

      - name: "prep env"
        env:
          DOTENV: ${{ secrets.DOTENV }}
        run: |
          echo -n $DOTENV | base64 -d > .env

      - name: "Install uv"
        uses: astral-sh/setup-uv@v8.0.0

      - name: "Install the project"
        run: uv sync --all-extras --dev

      - name: "Authorize runner IP for shared proxy endpoint"
        run: |
          uv run python -m provider_data.utils.update_proxy_endpoint --propagation-seconds 15

      - name: "Prepare output directory"
        run: |
          mkdir -p output
          rm -f output/*.json

      - name: "Refresh ${{ matrix.provider.provider_name }}"
        id: refresh
        continue-on-error: true
        run: |
          set -a
          source .env
          set +a
          HTTPS_PROXY="https://${PROXY_ENDPOINT}:443" uv run provider_data/${{ matrix.provider.script }}.py --refresh

      - name: "Check refreshed output exists"
        id: output_exists
        if: steps.refresh.outcome == 'success'
        run: |
          if [ -f "output/${{ matrix.provider.output_file }}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Refresh finished without writing output/${{ matrix.provider.output_file }}"
          fi

      - name: "Validate GeoJSON for ${{ matrix.provider.provider_name }}"
        if: steps.refresh.outcome == 'success' && steps.output_exists.outputs.exists == 'true'
        run: |
          uv run pytest tests/test_geojson.py -q

      - name: "Validate snapshot drift for ${{ matrix.provider.provider_name }}"
        id: snapshot
        if: steps.refresh.outcome == 'success' && steps.output_exists.outputs.exists == 'true'
        continue-on-error: true
        run: |
          uv run python -m provider_data.utils.validate_provider_snapshot \
            --expected-file "${{ matrix.provider.output_file }}" \
            --output-dir output \
            --threshold 10.0

      - name: "Deploy ${{ matrix.provider.provider_name }} to dev"
        id: deploy
        if: steps.refresh.outcome == 'success' && steps.output_exists.outputs.exists == 'true' && steps.snapshot.outcome == 'success'
        continue-on-error: true
        run: |
          uv run provider_data/${{ matrix.provider.script }}.py --dev

      - name: "Record provider outcome"
        if: always()
        env:
          OUTPUT_EXISTS: ${{ steps.output_exists.outputs.exists }}
          SNAPSHOT_OUTCOME: ${{ steps.snapshot.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
        run: |
          uv run python -m provider_data.utils.workflow_status \
            --provider-name "${{ matrix.provider.provider_name }}" \
            --script "${{ matrix.provider.script }}" \
            --output-file "${{ matrix.provider.output_file }}" \
            --refresh-outcome "${{ steps.refresh.outcome }}" \
            --output-exists "${OUTPUT_EXISTS:-false}" \
            --snapshot-outcome "${SNAPSHOT_OUTCOME:-skipped}" \
            --deploy-outcome "${DEPLOY_OUTCOME:-skipped}" \
            --status-dir .provider-status

      - name: "Upload provider status artifact"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: provider-status-${{ matrix.provider.provider_name }}
          path: .provider-status/${{ matrix.provider.provider_name }}.json
          if-no-files-found: error

      - name: "Upload eligible provider output artifact"
        if: steps.deploy.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: provider-output-${{ matrix.provider.provider_name }}
          path: output/${{ matrix.provider.output_file }}
          if-no-files-found: error

      - name: "Fail provider job when refresh, validation, or dev deploy failed"
        if: steps.refresh.outcome != 'success' || steps.output_exists.outputs.exists != 'true' || steps.snapshot.outcome == 'failure' || steps.deploy.outcome == 'failure'
        run: |
          echo "::error::${{ matrix.provider.provider_name }} was not eligible for dev deploy and fresh snapshot publication."
          exit 1

  finalize-dev-update:
    needs: [prepare, update-providers]
    runs-on: ubuntu-24.04
    if: always() && needs.prepare.result == 'success'
    outputs:
      has_deployed: ${{ steps.finalize.outputs.has_deployed }}

    steps:
      - uses: actions/checkout@v6

      - name: "prep env"
        env:
          DOTENV: ${{ secrets.DOTENV }}
        run: |
          echo -n $DOTENV | base64 -d > .env

      - name: "Install uv"
        uses: astral-sh/setup-uv@v8.0.0

      - name: "Install the project"
        run: uv sync --all-extras --dev

      - name: "Download provider artifacts"
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          path: .artifacts

      - name: "Finalize dev update"
        id: finalize
        env:
          EXPECTED_PROVIDERS: ${{ needs.prepare.outputs.providers }}
        run: |
          uv run python -m provider_data.utils.finalize_dev_update \
            --expected-providers-json "${EXPECTED_PROVIDERS}" \
            --artifacts-dir .artifacts \
            --output-dir output \
            --github-output "$GITHUB_OUTPUT"

      - name: "Generate sitemap"
        if: steps.finalize.outputs.has_deployed == 'true'
        run: |
          uv run provider_data/utils/generate_sitemap.py --dev

  notify-on-failure:
    needs: [prepare, update-providers, finalize-dev-update]
    runs-on: ubuntu-24.04
    if: >-
      always() && (
        needs.prepare.result == 'failure' ||
        needs.update-providers.result == 'failure' ||
        needs.finalize-dev-update.result == 'failure'
      )

    steps:
      - name: "Notify in Chat on Failure"
        env:
          WEBHOOK_URL: ${{ secrets.G_WEBHOOK }}
        run: |
          curl -s -H "content-type: application/json" \
            -d '{
              "text": "🚨 Provider Data Update Failed!\n\n
              Workflow: ${{ github.workflow }}\n
              Repository: ${{ github.repository }}\n
              Branch: ${{ github.ref_name }}\n
              Commit: ${{ github.sha }}\n
              Triggered by: ${{ github.actor }}\n\n
              View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' \
            "${WEBHOOK_URL}" >/dev/null
